name: Prebuilt Linux Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Build amd64
        env:
          CGO_ENABLED: 1
          GOPROXY: direct
        run: |
          rm -rf build dist && mkdir -p build dist
          go mod tidy
          go build -ldflags "-w -s" -o build/x-ui main.go
          chmod +x DockerInit.sh
          ./DockerInit.sh amd64
          cp x-ui.sh build/x-ui.sh
          echo "$GITHUB_SHA" > build/.x-mili-commit
          tar -C build -czf "dist/x-mili-linux-amd64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: x-mili-linux-amd64
          path: dist/x-mili-linux-amd64.tar.gz

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Build arm64
        env:
          CGO_ENABLED: 1
          GOPROXY: direct
        run: |
          rm -rf build dist && mkdir -p build dist
          go mod tidy
          go build -ldflags "-w -s" -o build/x-ui main.go
          chmod +x DockerInit.sh
          ./DockerInit.sh arm64
          cp x-ui.sh build/x-ui.sh
          echo "$GITHUB_SHA" > build/.x-mili-commit
          tar -C build -czf "dist/x-mili-linux-arm64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: x-mili-linux-arm64
          path: dist/x-mili-linux-arm64.tar.gz

  publish:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest
          gh release view latest >/dev/null 2>&1 || gh release create latest --title "Latest LITE ARM" --notes "fix openvpn newline bug + outbound syntax" --prerelease
          gh release upload latest dist/x-mili-linux-*.tar.gz --clobber
