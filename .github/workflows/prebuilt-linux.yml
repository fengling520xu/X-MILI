name: Prebuilt Linux Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.8'
          cache: true
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build amd64 static (musl)
        env:
          CGO_ENABLED: 1
          CC: musl-gcc
          GOPROXY: https://goproxy.cn,https://goproxy.io,direct
        run: |
          cat > go.mod <<'MOD'
          module github.com/mhsanaei/3x-ui/v2
          go 1.23
          require (
            github.com/gin-contrib/gzip v1.2.6
            github.com/gin-contrib/sessions v1.1.0
            github.com/gin-gonic/gin v1.10.0
            github.com/goccy/go-json v0.10.6
            github.com/goccy/go-yaml v1.19.2
            github.com/google/uuid v1.6.0
            github.com/gorilla/websocket v1.5.3
            github.com/joho/godotenv v1.5.1
            github.com/nicksnyder/go-i18n/v2 v2.6.1
            github.com/op/go-logging v0.0.0-20160315200505-970db520ece7
            github.com/pelletier/go-toml/v2 v2.3.1
            github.com/robfig/cron/v3 v3.0.1
            github.com/shirou/gopsutil/v4 v4.26.4
            github.com/valyala/fasthttp v1.70.0
            github.com/xlzd/gotp v0.1.0
            github.com/xtls/xray-core v1.8.24
            go.uber.org/atomic v1.11.0
            golang.org/x/crypto v0.32.0
            golang.org/x/exp v0.0.0-20231006140011-7918f672742d
            golang.org/x/sync v0.11.0
            golang.org/x/sys v0.32.0
            golang.org/x/text v0.22.0
            google.golang.org/grpc v1.68.0
            gorm.io/driver/sqlite v1.6.0
            gorm.io/gorm v1.31.0
          )
          MOD
          rm -f go.sum
          go mod tidy
          rm -rf build dist && mkdir -p build dist
          # 静态编译: 兼容所有 Linux 发行版 (包括 glibc 2.17+)
          go build -tags "osusergo,netgo,static_build" \
            -ldflags "-w -s -linkmode external -extldflags '-static'" \
            -o build/x-ui main.go
          file build/x-ui
          chmod +x DockerInit.sh
          ./DockerInit.sh amd64
          cp x-ui.sh build/x-ui.sh
          echo "$GITHUB_SHA" > build/.x-mili-commit
          tar -C build -czf "dist/x-mili-linux-amd64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: x-mili-linux-amd64
          path: dist/x-mili-linux-amd64.tar.gz

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.8'
          cache: true
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build arm64 static (musl)
        env:
          CGO_ENABLED: 1
          CC: musl-gcc
          GOPROXY: https://goproxy.cn,https://goproxy.io,direct
        run: |
          cat > go.mod <<'MOD'
          module github.com/mhsanaei/3x-ui/v2
          go 1.23
          require (
            github.com/gin-contrib/gzip v1.2.6
            github.com/gin-contrib/sessions v1.1.0
            github.com/gin-gonic/gin v1.10.0
            github.com/goccy/go-json v0.10.6
            github.com/goccy/go-yaml v1.19.2
            github.com/google/uuid v1.6.0
            github.com/gorilla/websocket v1.5.3
            github.com/joho/godotenv v1.5.1
            github.com/nicksnyder/go-i18n/v2 v2.6.1
            github.com/op/go-logging v0.0.0-20160315200505-970db520ece7
            github.com/pelletier/go-toml/v2 v2.3.1
            github.com/robfig/cron/v3 v3.0.1
            github.com/shirou/gopsutil/v4 v4.26.4
            github.com/valyala/fasthttp v1.70.0
            github.com/xlzd/gotp v0.1.0
            github.com/xtls/xray-core v1.8.24
            go.uber.org/atomic v1.11.0
            golang.org/x/crypto v0.32.0
            golang.org/x/exp v0.0.0-20231006140011-7918f672742d
            golang.org/x/sync v0.11.0
            golang.org/x/sys v0.32.0
            golang.org/x/text v0.22.0
            google.golang.org/grpc v1.68.0
            gorm.io/driver/sqlite v1.6.0
            gorm.io/gorm v1.31.0
          )
          MOD
          rm -f go.sum
          go mod tidy
          rm -rf build dist && mkdir -p build dist
          # 静态编译: 兼容所有 Linux 发行版 (包括 glibc 2.17+)
          go build -tags "osusergo,netgo,static_build" \
            -ldflags "-w -s -linkmode external -extldflags '-static'" \
            -o build/x-ui main.go
          # 验证: 应显示 "statically linked"
          file build/x-ui
          chmod +x DockerInit.sh
          ./DockerInit.sh arm64
          cp x-ui.sh build/x-ui.sh
          echo "$GITHUB_SHA" > build/.x-mili-commit
          tar -C build -czf "dist/x-mili-linux-arm64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: x-mili-linux-arm64
          path: dist/x-mili-linux-arm64.tar.gz

  publish:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest
          gh release view latest >/dev/null 2>&1 || gh release create latest --title "Latest LITE ARM" --notes "static build, compatible with all Linux distros" --prerelease
          gh release upload latest dist/x-mili-linux-*.tar.gz --clobber
