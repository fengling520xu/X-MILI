{{define "modals/vpngateModal"}}
<a-modal id="vpngate-modal" v-model="vpngateModal.visible" title="VPNGate" :confirm-loading="vpngateModal.confirmLoading"
    :closable="true" :mask-closable="true" :footer="null" :class="themeSwitcher.currentTheme" width="1100px">
    <template v-if="vpngateModal.servers.length === 0">
        <a-button icon="api" @click="create()" :loading="vpngateModal.confirmLoading">{{ i18n "create" }}</a-button>
    </template>
    <template v-else>
        <div class="vpngate-top">
            <div class="vpngate-panel">
                <div class="vpngate-panel-title">规则设置</div>
                <div class="vpngate-mode-list">
                    <button class="vpngate-mode" :class="{ active: vpngateModal.ruleMode === 'default' }"
                        @click="vpngateModal.ruleMode = 'default'">
                        <span>默认连接</span>
                        <small>始终选择延迟最低的可用节点</small>
                    </button>
                    <button class="vpngate-mode" :class="{ active: vpngateModal.ruleMode === 'fixed' }"
                        @click="vpngateModal.ruleMode = 'fixed'">
                        <span>固定连接</span>
                        <small>只连接所选国家，全部失效则停止</small>
                    </button>
                    <button class="vpngate-mode" :class="{ active: vpngateModal.ruleMode === 'dynamic' }"
                        @click="vpngateModal.ruleMode = 'dynamic'">
                        <span>动态连接</span>
                        <small>优先所选国家，失效后回退默认规则</small>
                    </button>
                </div>
                <a-select v-if="vpngateModal.ruleMode !== 'default'"
                    mode="multiple"
                    v-model="vpngateModal.selectedCountries"
                    :dropdown-class-name="themeSwitcher.currentTheme"
                    :style="{ width: '100%', marginTop: '10px' }"
                    placeholder="选择国家">
                    <a-select-option v-for="country in countryOptions" :key="country.value" :value="country.value">
                        [[ country.label ]]
                    </a-select-option>
                </a-select>
            </div>
            <div class="vpngate-panel vpngate-current">
                <div class="vpngate-panel-title">当前连接节点</div>
                <template v-if="bestServer">
                    <div class="vpngate-current-strip">
                        <div class="vpngate-current-main">
                            <small>IP</small>
                            <span class="vpngate-current-ip">[[ bestServer.ip ]]</span>
                        </div>
                        <div>
                            <small>国家</small>
                            <span class="vpngate-current-country">
                                <img class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + bestServer.countryShortLower + '.png'" :alt="bestServer.countryShort">
                                [[ bestServer.countryLong ]]
                            </span>
                        </div>
                        <div>
                            <small>IP 属性</small>
                            <a-tag :color="bestServer.ipType === '住宅IP' ? 'green' : (bestServer.ipType === '机房IP' ? 'orange' : 'default')">
                                [[ bestServer.ipType ]]
                            </a-tag>
                        </div>
                        <div>
                            <small>运营商</small>
                            <span>[[ bestServer.isp ]]</span>
                        </div>
                        <div>
                            <small>ASN</small>
                            <span>[[ bestServer.asn ]]</span>
                        </div>
                        <div>
                            <small>延迟</small>
                            <span :class="pingClass(bestServer.localPing)">[[ bestServer.localPing ]] ms</span>
                        </div>
                        <div>
                            <small>规则</small>
                            <span>[[ ruleName ]]</span>
                        </div>
                    </div>
                </template>
                <div v-else class="vpngate-current-empty">当前规则没有可用节点</div>
            </div>
            <div class="vpngate-panel" v-if="connectionActive">
                <div class="vpngate-panel-title">连接进度</div>
                <a-progress :percent="vpngateModal.connectStatus.progress || 0" :status="progressStatus"></a-progress>
                <div class="vpngate-status-line">
                    <span>[[ vpngateModal.connectStatus.message ]]</span>
                    <span v-if="vpngateModal.connectStatus.tunIP" class="vpngate-mono">[[ vpngateModal.connectStatus.tunDev ]] · [[ vpngateModal.connectStatus.tunIP ]]</span>
                </div>
                <a-button v-if="canCancel" size="small" type="danger" icon="close" @click="cancelConnect">取消</a-button>
            </div>
        </div>
        <div class="vpngate-table-wrap">
            <table class="vpngate-table">
                <thead>
                    <tr>
                        <th>国家</th>
                        <th>IP</th>
                        <th>连接数</th>
                        <th>ASN</th>
                        <th>IP 类型</th>
                        <th>本地延迟</th>
                        <th>配置文件</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="server in vpngateModal.servers" :key="server.hostName + server.ip">
                        <td>
                            <span class="vpngate-country">
                                <img class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + server.countryShortLower + '.png'" :alt="server.countryShort">
                                [[ server.countryLong ]]
                            </span>
                        </td>
                        <td class="vpngate-mono">[[ server.ip ]]</td>
                        <td>[[ server.numSessions ]]</td>
                        <td class="vpngate-mono">[[ server.asn ]]</td>
                        <td>
                            <a-tag :color="server.ipType === '住宅IP' ? 'green' : (server.ipType === '机房IP' ? 'orange' : 'default')">
                                [[ server.ipType ]]
                            </a-tag>
                        </td>
                        <td>
                            <span :class="pingClass(server.localPing)">
                                [[ server.localPing < 0 ? '超时' : server.localPing + ' ms' ]]
                            </span>
                        </td>
                        <td>
                            <a-button size="small" icon="download" @click="downloadConfig(server)">下载</a-button>
                            <a-button size="small" icon="copy" @click="copyConfig(server)" :style="{ marginLeft: '6px' }">复制</a-button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="vpngate-footer">
            <a-tag color="green">[[ vpngateModal.servers.length ]] 个可用节点</a-tag>
            <div class="vpngate-footer-actions">
                <a-button icon="sync" @click="create(true)" :loading="vpngateModal.confirmLoading">刷新</a-button>
                <a-button @click="vpngateModal.close">关闭</a-button>
                <a-button type="primary" icon="plus" @click="addOutbound" :loading="connectBusy" :disabled="!bestServer || connectBusy">添加出站</a-button>
            </div>
        </div>
    </template>
</a-modal>
<script>
    const vpngateModal = {
        visible: false,
        confirmLoading: false,
        servers: [],
        ruleMode: 'default',
        selectedCountries: [],
        connectStatus: {
            phase: 'idle',
            progress: 0,
            message: '',
        },
        statusTimer: null,
        show() {
            this.visible = true;
        },
        close() {
            this.visible = false;
        },
        loading(loading = true) {
            this.confirmLoading = loading;
        },
    };

    new Vue({
        delimiters: ['[[', ']]'],
        el: '#vpngate-modal',
        data: {
            vpngateModal: vpngateModal,
        },
        computed: {
            countryOptions() {
                const countries = new Map();
                vpngateModal.servers.forEach(server => {
                    if (!server.countryShort) return;
                    countries.set(server.countryShort, {
                        value: server.countryShort,
                        label: `${server.countryLong} (${server.countryShort})`,
                    });
                });
                return Array.from(countries.values()).sort((a, b) => a.label.localeCompare(b.label));
            },
            selectedServers() {
                if (vpngateModal.ruleMode === 'default' || vpngateModal.selectedCountries.length === 0) {
                    return vpngateModal.servers;
                }
                return vpngateModal.servers.filter(server => vpngateModal.selectedCountries.includes(server.countryShort));
            },
            bestServer() {
                const pool = this.selectedServers.length > 0 ? this.selectedServers : (
                    vpngateModal.ruleMode === 'dynamic' ? vpngateModal.servers : []
                );
                return pool.slice().sort((a, b) => this.pingRank(a.localPing) - this.pingRank(b.localPing))[0] || null;
            },
            ruleHint() {
                if (vpngateModal.ruleMode === 'fixed') return '只连接所选国家，全部失效则停止';
                if (vpngateModal.ruleMode === 'dynamic') return '优先所选国家，全部失效则默认连接';
                return '';
            },
            ruleName() {
                return {
                    default: '默认连接',
                    fixed: '固定连接',
                    dynamic: '动态连接',
                }[vpngateModal.ruleMode];
            },
            connectionActive() {
                return vpngateModal.connectStatus.phase && vpngateModal.connectStatus.phase !== 'idle';
            },
            connectBusy() {
                return ['installing', 'preparing', 'connecting'].includes(vpngateModal.connectStatus.phase);
            },
            canCancel() {
                return this.connectBusy;
            },
            progressStatus() {
                if (vpngateModal.connectStatus.phase === 'failed') return 'exception';
                if (vpngateModal.connectStatus.phase === 'connected') return 'success';
                return 'active';
            },
        },
        methods: {
            async create(refresh = false) {
                vpngateModal.loading(true);
                const msg = await HttpUtil.post('/panel/xray/vpngate/list', { refresh: refresh ? 'true' : '' });
                vpngateModal.loading(false);
                if (msg.success) {
                    vpngateModal.servers = msg.obj || [];
                }
            },
            decodeConfig(server) {
                return atob(server.openVPNConfig || '');
            },
            configName(server) {
                return `${server.hostName || 'vpngate'}_${server.ip}.ovpn`;
            },
            downloadConfig(server) {
                const blob = new Blob([this.decodeConfig(server)], { type: 'application/x-openvpn-profile' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = this.configName(server);
                link.click();
                URL.revokeObjectURL(link.href);
            },
            async copyConfig(server) {
                const text = this.decodeConfig(server);
                if (navigator.clipboard) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const input = document.createElement('textarea');
                    input.value = text;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                }
                Vue.prototype.$message.success('{{ i18n "copySuccess" }}');
            },
            pingClass(ping) {
                if (ping < 0) return 'vpngate-ping-slow';
                if (ping < 50) return 'vpngate-ping-fast';
                if (ping < 150) return 'vpngate-ping-medium';
                return 'vpngate-ping-slow';
            },
            pingRank(ping) {
                return ping < 0 ? Number.MAX_SAFE_INTEGER : ping;
            },
            setConnectStatus(status) {
                vpngateModal.connectStatus = status || { phase: 'idle', progress: 0, message: '' };
            },
            startStatusTimer() {
                this.stopStatusTimer();
                vpngateModal.statusTimer = setInterval(() => this.refreshConnectStatus(), 1200);
            },
            stopStatusTimer() {
                if (vpngateModal.statusTimer) {
                    clearInterval(vpngateModal.statusTimer);
                    vpngateModal.statusTimer = null;
                }
            },
            async refreshConnectStatus() {
                const msg = await HttpUtil.post('/panel/xray/vpngate/status');
                if (!msg.success) return;
                this.setConnectStatus(msg.obj);
                if (msg.obj.phase === 'connected') {
                    this.stopStatusTimer();
                    this.upsertVPNGateOutbound(msg.obj.outbound);
                    vpngateModal.loading(false);
                    Vue.prototype.$message.success('VPNGate 已连接，已填入 vpngate 出站，请保存 Xray 配置');
                }
                if (['failed', 'canceled'].includes(msg.obj.phase)) {
                    this.stopStatusTimer();
                    vpngateModal.loading(false);
                }
            },
            async addOutbound() {
                if (!this.bestServer) return;
                vpngateModal.loading(true);
                const msg = await HttpUtil.post('/panel/xray/vpngate/start', {
                    server: JSON.stringify(this.bestServer),
                });
                if (msg.success) {
                    this.setConnectStatus(msg.obj);
                    this.startStatusTimer();
                } else {
                    vpngateModal.loading(false);
                }
            },
            async cancelConnect() {
                const msg = await HttpUtil.post('/panel/xray/vpngate/cancel');
                if (msg.success) {
                    this.setConnectStatus(msg.obj);
                    this.stopStatusTimer();
                }
                vpngateModal.loading(false);
            },
            upsertVPNGateOutbound(outbound) {
                if (!outbound || !app.templateSettings) return;
                const outbounds = app.templateSettings.outbounds || [];
                const index = outbounds.findIndex(o => o.tag === outbound.tag);
                if (index >= 0) {
                    outbounds[index] = outbound;
                } else {
                    outbounds.push(outbound);
                }
                app.templateSettings.outbounds = outbounds;
                app.outboundSettings = JSON.stringify(outbounds);
                app.refreshOutboundTraffic();
            },
        },
    });
</script>
{{end}}
